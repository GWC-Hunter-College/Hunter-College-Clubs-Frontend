name: Deploy Frontend to S3 + CloudFront (Staging)

on:
  push:
    branches:
      - staging

jobs:
  deploy-staging:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm ci
        working-directory: ./

      - name: Build frontend
        run: npm run build
        working-directory: ./    

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1  # Change this if your resources are in a different region

      - name: Upload to S3
        run: |
          aws s3 sync ./dist/ s3:${{ vars.AWS_S3_BUCKET_DESTINATION_STAGING }} --delete

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ vars.AWS_CF_DIST_ID_STAGING }} \
            --paths "/*"
